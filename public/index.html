<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GitWeaver</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="/styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <!-- Landing View -->
    <div id="landing-content" class="container" style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center;">
        <div class="logo" style="width: 64px; height: 64px; margin-bottom: 2rem;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg>
        </div>
        <h1 style="font-size: 3rem; font-weight: 800; letter-spacing: -0.05em; margin-bottom: 1rem;">GitWeaver</h1>
        <p style="color: var(--ds-accents-5); margin-bottom: 2rem; max-width: 500px;">Develop. Preview. Ship.</p>
        <a href="/auth/github" class="btn btn-primary btn-large">Continue with GitHub</a>
    </div>

    <!-- App Content -->
    <div id="app-content" style="display: none;">
        <nav class="navbar">
            <div class="nav-top">
                <div class="nav-left">
                    <div class="logo">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon></svg>
                    </div>
                    <span id="nav-username" class="desktop-only" style="font-size: 14px; font-weight: 500;">Developer</span>
                </div>
                
                <div class="nav-right">
                    <!-- Desktop Search -->
                    <div class="search-cmd desktop-only" id="desktop-search-btn">
                        <i data-lucide="search" style="width: 14px;"></i>
                        <input type="text" placeholder="Search..." disabled style="pointer-events: none; background: transparent; border: none; color: inherit;">
                        <span class="kbd">⌘K</span>
                    </div>
                    
                    <!-- Mobile Search Icon -->
                    <button class="mobile-only btn btn-secondary" id="mobile-search-trigger" style="border: none;">
                        <i data-lucide="search"></i>
                    </button>
                    
                    <!-- Logout -->
                    <a href="/auth/logout" class="btn btn-secondary">
                        <i data-lucide="log-out"></i>
                        <span class="btn-logout-text desktop-only">Logout</span>
                    </a>
                </div>
            </div>

            <!-- Mobile Search Overlay -->
            <div class="mobile-search-overlay" id="mobile-search-panel">
                <input type="text" class="mobile-search-input" id="mobile-search-input" placeholder="Search repositories...">
            </div>
            
            <div class="nav-tabs-container">
                <div class="nav-tabs">
                    <button class="nav-tab active" data-view="dashboard-view">Overview</button>
                    <button class="nav-tab" data-view="create-view">Deploy</button>
                    <button class="nav-tab" data-view="editor-view">Rapid Edit</button>
                    <button class="nav-tab" data-view="analytics-view">Analytics</button>
                </div>
            </div>
        </nav>

        <main class="container">
            <!-- Dashboard -->
            <section id="dashboard-view" class="view active">
                <div id="repo-list" class="project-grid">
                    <!-- Cards -->
                </div>
            </section>

            <!-- Create -->
            <section id="create-view" class="view">
                <div class="card-panel">
                    <div class="card-header">
                        <h2>Create New Project</h2>
                    </div>
                    <div class="card-body">
                        <div class="input-group">
                            <label>Repo Name</label>
                            <input type="text" id="repo-name" placeholder="my-awesome-project">
                        </div>
                        <div class="input-group">
                            <label>Visibility</label>
                            <select id="repo-visibility"><option value="public">Public</option><option value="private">Private</option></select>
                        </div>
                    </div>
                    <div class="card-footer">
                        <button id="deploy-btn" class="btn btn-primary">Deploy</button>
                    </div>
                </div>
            </section>

            <!-- Other views omitted for brevity in template rewrite, but kept in logic -->
            <section id="editor-view" class="view">
                <div class="card-panel"><div class="card-header"><h2>Rapid Edit</h2></div><div class="card-body">
                <input type="text" id="target-repo" placeholder="owner/repo" style="margin-bottom: 1rem;">
                <input type="text" id="file-name" placeholder="path/to/file.ext" style="margin-bottom: 1rem;">
                <textarea id="file-content" style="width: 100%; height: 300px; background: #000; color: #fff; border: 1px solid #333; padding: 1rem; font-family: monospace;"></textarea>
                </div><div class="card-footer"><button id="publish-btn" class="btn btn-primary">Push Changes</button></div></div>
            </section>
            
            <section id="analytics-view" class="view">
                <div class="metrics-row">
                    <div class="metric-box"><span class="metric-title">Total Repos</span><span class="metric-value" id="total-repos-count">0</span></div>
                </div>
            </section>
        </main>
    </div>

    <!-- Vercel Modal -->
    <div id="repo-modal" class="modal-overlay">
        <div class="modal-card">
            <div class="modal-header">
                <h2 id="modal-repo-name">--</h2>
                <button class="modal-close"><i data-lucide="x"></i></button>
            </div>
            <div class="nav-tabs-container">
                <div class="nav-tabs">
                    <button class="nav-tab active modal-tab-btn" data-tab="setup">Quick Setup</button>
                    <button class="nav-tab modal-tab-btn" data-tab="commits">Activity</button>
                </div>
            </div>
            <div class="modal-body">
                <div id="tab-setup" class="tab-pane active">
                    <p style="color: var(--ds-accents-5); margin-bottom: 1rem;">Push an existing repository from your command line:</p>
                    <div class="code-block" id="git-commands">
                        git remote add origin https://github.com/user/repo.git<br>
                        git branch -M main<br>
                        git push -u origin main
                    </div>
                </div>
                <div id="tab-commits" class="tab-pane">
                    <div id="commits-list">Fetching activity...</div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>
    <script src="/script.js"></script>
</body>
</html>

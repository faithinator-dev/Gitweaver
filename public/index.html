<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitWeaver - Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>GitWeaver</h1>
            <p>Your GitHub Repository Manager</p>
            <div id="auth-section">
                <a href="/auth/github" class="btn btn-primary" id="login-btn">Login with GitHub</a>
                <a href="/auth/logout" class="btn btn-secondary" id="logout-btn" style="display: none;">Logout</a>
            </div>
        </header>

        <main id="dashboard" style="display: none;">
            <section id="repo-list-section">
                <h2>Your Repositories</h2>
                <div id="repo-list">Loading repositories...</div>
            </section>

            <section id="create-repo-section">
                <h2>Create Repository</h2>
                <form id="create-repo-form">
                    <input type="text" id="repo-name" placeholder="Repository Name" required>
                    <button type="submit" class="btn btn-primary">Create Repo</button>
                </form>
            </section>

            <section id="update-file-section">
                <h2>Edit Website Content</h2>
                <form id="update-file-form">
                    <input type="text" id="owner-name" placeholder="GitHub Owner/Username" required>
                    <input type="text" id="target-repo" placeholder="Target Repository Name" required>
                    <input type="text" id="file-name" placeholder="Filename (e.g., index.html)" required>
                    <textarea id="file-content" placeholder="Enter content here..." rows="10" required></textarea>
                    <button type="submit" class="btn btn-success">Publish to GitHub</button>
                </form>
            </section>
        </main>

        <div id="status-message"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
